---
- name: Deploy Keycloak controller
  hosts: "{{ inference_delegate | default('kube_control_plane') }}"
  gather_facts: false
  any_errors_fatal: "{{ any_errors_fatal | default(true) }}"
  environment: "{{ proxy_disable_env | default(env_proxy | default({})) }}"
  vars_files:
    - "{{ lookup('env', 'PWD') }}/config/vars/inference_common.yml"
  roles:
    - role: inference-tools
  tasks:
    - name: Add ingress-nginx repository using Helm module (internet)
      community.kubernetes.helm_repository:
        name: ingress-nginx
        repo_url: https://kubernetes.github.io/ingress-nginx
        state: present
      when: not airgap_enabled | bool

    - name: Add ingress-nginx repository (airgap via JFrog)
      ansible.builtin.command: >
        helm repo add ingress-nginx {{ helm_repo_ingress_nginx }}
        --username {{ jfrog_username }} --password {{ jfrog_password }}
        --force-update
      when: airgap_enabled | bool
      changed_when: false
    - name: Add Ingress-Nginx repository
      ansible.builtin.command: helm repo list
      register: helm_repo_list
      failed_when: false
      changed_when: false
    - name: Synchronize repositories
      ansible.builtin.shell: helm repo update
      when: helm_repo_list.stdout != ""
