# Default values for the sglang Helm chart.
# Targets lmsysorg/sglang:v0.5.11-xeon on an Intel Xeon (AMX) CPU node.
#
# IMPORTANT — quantization support on this image:
#   The Xeon CPU build of sglang supports a small, explicit subset of
#   quantization methods (see CPU_QUANTIZATION_METHODS in
#   sglang/srt/layers/quantization/__init__.py):
#       fp8, w8a8_int8, compressed-tensors, awq, gptq
#   It does NOT support mxfp4, which is the native quantization of
#   openai/gpt-oss-{20b,120b}. Those models require a CUDA/HIP sglang
#   image (e.g. lmsysorg/sglang:v0.5.11-cuda) on a GPU host. To serve
#   gpt-oss on CPU, use llama.cpp/Ollama/vLLM-CPU on a GGUF variant,
#   not this chart. See README.md for the supported-model list.

nameOverride: ""
fullnameOverride: ""

namespace: default
replicaCount: 1

image:
  # Patched image built from image-build/ — required for gpt-oss-on-CPU
  # (fix1..fix8) and the Phase 2 precision-debug flags (fix9-debug,
  # fix10-debug). Use `image-build/build-and-import.sh` to build + import
  # into k3s containerd. Switch back to `lmsysorg/sglang:v0.5.11-xeon` for
  # non-gpt-oss models that don't need the patch stack.
  repository: enterprise-inference/sglang
  tag: "v0.5.12-xeon-fix10-debug"
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels:
  app: sglang

# SGLang writes to HF cache + /dev/shm; do not lock the root FS.
podSecurityContext:
  runAsNonRoot: false
  fsGroup: 0

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

# ---- Model ----
# Default is Qwen3-8B because it is bf16 (no quantization gate), modest in
# size, and listed as a supported CPU model in sglang docs. Override
# modelSource/modelName for other models.
modelSource: "Qwen/Qwen3-8B"
modelName: "qwen3-8b"

# HuggingFace Hub token. Required for gated repos (e.g. meta-llama/*).
# Either:
#   1. --set huggingface.token=$HF_TOKEN   (chart creates the secret), or
#   2. pre-create:  kubectl create secret generic hf-token-secret \
#                     --from-literal=token=<token>
huggingface:
  token: ""
  secretName: "hf-token-secret"
  secretKey: "token"

# ---- Server / launch flags ----
server:
  port: 30000
  host: "0.0.0.0"

  # Force CPU device for the xeon image.
  device: "cpu"

  # Tensor parallel rank count. CPU build typically runs tp=1.
  # Set >1 only when binding ranks to separate NUMA domains via
  # cpuEngine.ompThreadsBind.
  tpSize: 1
  # Data parallel rank count. Omit (leave empty) unless you know you want
  # multiple replicas of the model loaded in one process.
  dpSize: ""

  # dtype: bfloat16 is the recommended dtype on Xeon AMX. Leave empty to
  # let sglang infer from the checkpoint.
  dtype: "bfloat16"

  # --quantization. Must be one of: fp8 | w8a8_int8 | compressed-tensors |
  # awq | gptq, OR leave empty to use whatever is declared in the model
  # config.json. Anything else (mxfp4, modelopt_fp4, etc.) will be rejected
  # by sglang at startup.
  quantization: ""

  # Trust model code from HF (required by some recent models).
  trustRemoteCode: true

  # Recommended for CPU per sglang docs/platforms/cpu_server.md
  disableOverlapSchedule: true

  # --enable-torch-compile can give a sizeable speedup on Xeon but slows
  # cold start substantially. Off by default; flip on for benchmarks.
  enableTorchCompile: false
  torchCompileMaxBs: 4

  # Optional caps. Leave empty to use the model default.
  contextLength: ""
  maxRunningRequests: ""

  # --max-total-tokens caps KV cache size in tokens. STRONGLY recommended on
  # Kubernetes — sglang reads host memory via psutil and ignores cgroup
  # limits, so without this it tries to claim ~85-93% of the *node's* RAM
  # for KV cache and gets OOMKilled. Sized below for 32Ki context * a few
  # in-flight requests on an 8B bf16 model.
  maxTotalTokens: 32768

  # --mem-fraction-static. Leave empty to keep sglang's default (0.85+).
  # On k8s, prefer maxTotalTokens above. If you must use a fraction,
  # remember it is a fraction of host RAM, not the pod limit.
  memFractionStatic: ""

  # Any extra command-line flags appended verbatim, e.g.
  #   extraArgs: ["--mem-fraction-static", "0.85"]
  extraArgs: []

  livenessProbe:
    enabled: true
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 600
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 5
  readinessProbe:
    enabled: true
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 120
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 30

# ---- CPU engine tuning ----
# The image already bakes ENV SGLANG_USE_CPU_ENGINE=1 and LD_PRELOAD into
# the runtime, but we set them explicitly here so the chart is
# self-documenting and survives image-tag changes.
cpuEngine:
  enabled: true
  # Per-rank core binding for SGLang's OMP threads. Format: pipe-separated
  # per-rank ranges, e.g. "0-31|32-63" for a 2-rank tp on a 64-core node.
  # Leave empty to let SGLang use defaults.
  ompThreadsBind: ""
  # LD_PRELOAD baked into xeon.Dockerfile. Set to "" to drop it entirely
  # (only do this if you know why).
  ldPreload: "/usr/lib/x86_64-linux-gnu/libtcmalloc.so.4:/usr/lib/x86_64-linux-gnu/libtbbmalloc.so:/opt/.venv/lib/libiomp5.so"

# ---- Resources ----
# Starting points for Qwen3-8B (bf16, ~16Gi weights). For larger models
# bump both requests and limits.
resources:
  requests:
    cpu: "16"
    memory: "32Gi"
  limits:
    cpu: "32"
    memory: "64Gi"

# SGLang uses /dev/shm heavily for inter-process tensor sharing on CPU.
shm:
  enabled: true
  sizeLimit: "16Gi"

# ---- Storage (HuggingFace cache) ----
# PVC keeps downloaded weights across pod restarts.
storage:
  persistentVolume:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 60Gi
    existingClaim: ""
    deleteOnUninstall: true
  emptyDir:
    enabled: false
    sizeLimit: 60Gi

# Mount point inside the container for the HF cache (HF_HOME).
hfCacheMountPath: "/root/.cache/huggingface"

# ---- Service ----
service:
  type: ClusterIP
  port: 30000
  annotations: {}
  labels: {}

# ---- OIDC + APISIX + Ingress ----
# Mirrors the OVMS chart so the auth-apisix stack picks this up the same way.
oidc:
  enabled: true
  realm: master
  clientId: "my-client-id"
  clientSecret: "tf29wNR5fZ7edbNmnLSWDEvL7Simx4CR"
  discovery: "http://keycloak.default.svc.cluster.local/realms/master/.well-known/openid-configuration"
  introspectionEndpoint: "http://keycloak.default.svc.cluster.local/realms/master/protocol/openid-connect/token/introspect"

apisixRoute:
  enabled: true
  namespace: default
  name: ""
  host: "api.example.com"
  # IngressClass that the APISIX ingress controller v2 watches. Required
  # so the controller picks up this ApisixRoute and syncs it into APISIX's
  # runtime route table. Set to "" to omit the field (e.g. for older
  # controller versions that auto-discover).
  ingressClassName: "apisix"

ingress:
  enabled: true
  className: nginx
  namespace: auth-apisix
  host: "api.example.com"
  secretname: "api.example.com"

secrets:
  enabled: false
  data: {}

nodeSelector: {}
tolerations: []
affinity: {}
priorityClassName: ""

extraVolumes: []
extraVolumeMounts: []
# extraEnv: extra environment variables exposed to the sglang container.
#
# For gpt-oss-on-CPU the patched image needs the correct MXFP4 nibble order
# to decode weights properly (without this the model serves but emits
# random-vocab garbage):
#   - MXFP4_NIBBLE_ORDER=low_first    fix7 dequant nibble order
#
# Other debug flags exposed by the patched image (default off, here for
# reference):
#   - FP32_PROMOTE_MOE=1              fix10-debug: per-expert MoE in fp32
#   - ALLOW_FP32_MXFP4=1              fix9-debug: bypass dtype=bfloat16 force
#   - MXFP4_OUT_DTYPE=float32|float16 fix9-debug2: dequant output dtype
#
# For non-gpt-oss models, override with `extraEnv: []`.
extraEnv:
  - name: MXFP4_NIBBLE_ORDER
    value: "low_first"
extraEnvFrom: []
