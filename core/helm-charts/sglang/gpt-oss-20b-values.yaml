# Override values for gpt-oss-20b on Xeon CPU through the patched image.
#
# Usage:
#   helm upgrade gpt-oss-20b core/helm-charts/sglang \
#     -f core/helm-charts/sglang/gpt-oss-20b-values.yaml
#
# This is the production-shape config. Long-form (>~150-token) coherence
# is a known limitation of the pure-Python CPU MoE path on this image —
# see REMAINING_WORK.md "Long-form quality boundary" for the full Phase 2
# investigation and the precision-flag A/B that ruled out KV / lm_head /
# MoE-intermediate precision as the dominant cause. Short-form generation
# through the full auth-routed chain is solid.

modelSource: openai/gpt-oss-20b
modelName: gpt-oss-20b

image:
  repository: enterprise-inference/sglang
  tag: v0.5.12-xeon-fix11-debug
  pullPolicy: Never

server:
  dtype: bfloat16
  extraArgs:
    - --attention-backend
    - torch_native
    - --reasoning-parser
    - gpt-oss
    - --tool-call-parser
    - gpt-oss

resources:
  requests:
    memory: 48Gi
  limits:
    memory: 128Gi

storage:
  persistentVolume:
    size: 40Gi

ingress:
  enabled: true

apisixRoute:
  enabled: true

oidc:
  enabled: true
