# Xeon CPU-optimized override values for SGLang deployments
# This file contains lean, CPU-specific overrides for Intel Xeon processors
# Base values are inherited from values.yaml

# CPU deployment - no accelerator device
# Currently SGLang support for Xeon only model deployment, keep accelDevice empty to disable GPU/accelerator usage
accelDevice: ""

# CPU Balloon configuration for NRI resource policy for SGLang not supported, keep annotation empty to disable ballooning
cpu_balloon_annotation: ""


resources:
  requests:
    cpu: "{{ .Values.cpu }}"
    memory: "{{ .Values.memory }}"

# SGLang CPU image configuration
image:
  repository: lmsysorg/sglang
  tag: "v0.5.11-xeon"
  pullPolicy: IfNotPresent

# Node affinity for Xeon inference nodes
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: ei-inference-eligible
          operator: In
          values: ["true"]

# SGLang CPU environment variables

LLM_MODEL_ID: ""

modelConfigs:
  "meta-llama/Llama-3.1-8B-Instruct":
    configMapValues: {}
    extraCmdArgs:
      [
        "--trust-remote-code",
        "--disable-overlap-schedule",
        "--device",
        "cpu",
        "--enable-torch-compile",
        "--host",
        "0.0.0.0"
      ]
    tensor_parallel_size: "{{ .Values.tensor_parallel_size }}"
    pipeline_parallel_size: "{{ .Values.pipeline_parallel_size }}"

  "meta-llama/Llama-3.2-3B-Instruct":
    configMapValues: {}
    extraCmdArgs:
      [
        "--trust-remote-code",
        "--disable-overlap-schedule",
        "--device",
        "cpu",
        "--enable-torch-compile",
        "--host",
        "0.0.0.0"
      ]
    tensor_parallel_size: "{{ .Values.tensor_parallel_size }}"
    pipeline_parallel_size: "{{ .Values.pipeline_parallel_size }}"

# Default model configuration applied to all models if specific model config not defined and are supported by SGLang, can be overridden by specific modelConfigs if needed

defaultModelConfigs:
  configMapValues: {}
  extraCmdArgs:
      [
        "--trust-remote-code",
        "--disable-overlap-schedule",
        "--device",
        "cpu",
        "--enable-torch-compile",
        "--host",
        "0.0.0.0"
      ]
  tensor_parallel_size: "{{ .Values.tensor_parallel_size }}"
  pipeline_parallel_size: "{{ .Values.pipeline_parallel_size }}"
