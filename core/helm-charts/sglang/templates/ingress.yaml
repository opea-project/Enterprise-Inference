{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "sglang.fullname" . }}
  namespace: {{ .Values.ingress.namespace }}
  labels:
    {{- include "sglang.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /{{ .Values.modelName }}-sglang/$1
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.secretname }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.secretname }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /{{ .Values.modelName }}-sglang/(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{- if .Values.apisixRoute.enabled }} auth-apisix-gateway{{- else }} {{ include "sglang.fullname" . }}{{- end }}
                port:
                  number: 80
{{- end }}
