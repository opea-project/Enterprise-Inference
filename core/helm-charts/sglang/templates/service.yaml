apiVersion: v1
kind: Service
metadata:
  name: {{ include "sglang.fullname" . }}-service
  labels:
    {{- include "sglang.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 80
      targetPort: {{ .Values.port }}
      protocol: TCP
      name: sglang
  selector:
    {{- include "sglang.selectorLabels" . | nindent 4 }}