services:
  finetune-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finetune-api
    ports:
      - "8443:8443"      # HTTPS (production)
    env_file:
      - .env
    environment:
      # All sensitive values come from .env (see .env.example) — do NOT hardcode here
      - DATABASE_URL=${DATABASE_URL}
      - KEYCLOAK_ISSUER=${KEYCLOAK_ISSUER}
      - KEYCLOAK_AUDIENCE=${KEYCLOAK_AUDIENCE}
      - KEYCLOAK_INTERNAL_URL=${KEYCLOAK_INTERNAL_URL:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
    volumes:
      - ./app:/app/app
      - ./certs:/app/certs:ro     # Mount SSL certificates (read-only)
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: finetune-postgres
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finetune}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  default:
    name: finetune-network