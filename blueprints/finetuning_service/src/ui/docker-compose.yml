  #   ports:
  #     - "8000:8000"
  #   environment:
  #     - DATABASE_URL=postgresql://user:pass@db:5432/auth

  # files-service:
  #   image: your-files-service:latest
  #   ports:
  #     - "8001:8001"
  #   volumes:
  #     - ./uploads:/app/uploads

  # dataprep-service:
  #   image: your-dataprep-service:latest
  #   ports:
  #     - "8002:8002"

  # finetuning-service:
  #   image: your-finetuning-service:latest
  #   ports:
  #     - "8003:8003"

networks:
  default:
    name: finetuning-network