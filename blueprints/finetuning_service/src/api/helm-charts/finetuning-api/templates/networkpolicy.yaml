{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "finetuning-service.fullname" . }}
  labels:
    {{- include "finetuning-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "finetuning-service.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress

  ingress:
  # Allow ingress from API Gateway
  - from:
    {{- if .Values.networkPolicy.ingress.fromNamespaces }}
    {{- range .Values.networkPolicy.ingress.fromNamespaces }}
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: {{ . }}
    {{- end }}
    {{- end }}
    {{- if .Values.networkPolicy.ingress.fromPodLabels }}
    - podSelector:
        matchLabels:
          {{- toYaml .Values.networkPolicy.ingress.fromPodLabels | nindent 10 }}
    {{- end }}
    ports:
    - protocol: TCP
      port: 8000

  egress:
  # PostgreSQL database
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432

  # DNS resolution
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

  # External HTTPS/HTTP (Keycloak, Nvidia APIs, etc.)
  - ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 8443
    - protocol: TCP
      port: 8444
{{- end }}
