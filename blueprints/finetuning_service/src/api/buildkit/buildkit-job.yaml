apiVersion: batch/v1
kind: Job
metadata:
  name: buildkit-finetuning-service
  namespace: ${NAMESPACE}
  labels:
    app: finetuning-service
    component: builder
    managed-by: buildkit
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: finetuning-service
        component: builder
    spec:
      restartPolicy: Never
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: buildkit
          image: moby/buildkit:latest
          env:
            - name: http_proxy
              value: "${http_proxy}"
            - name: https_proxy
              value: "${https_proxy}"
            - name: no_proxy
              value: "${no_proxy}"
            - name: REGISTRY_URL
              value: "$REGISTRY_URL"
            - name: IMAGE_TAG
              value: "$IMAGE_TAG"
          command:
            - buildctl-daemonless.sh
          args:
            - build
            - "--frontend=dockerfile.v0"
            - "--local=context=/workspace"
            - "--local=dockerfile=/workspace"
            - "--opt=build-arg:http_proxy=${http_proxy}"
            - "--opt=build-arg:https_proxy=${https_proxy}"
            - "--opt=build-arg:no_proxy=${no_proxy}"
            - "--output=type=image,name=${REGISTRY_URL}/finetuning-service:${IMAGE_TAG},push=true,registry.insecure=true"
            - "--opt=cache-from=type=registry,ref=${REGISTRY_URL}/finetuning-service:buildcache,registry.insecure=true"
            - "--opt=cache-to=type=registry,ref=${REGISTRY_URL}/finetuning-service:buildcache,mode=max,registry.insecure=true"
            - "--opt=cache-from=type=registry,ref=${REGISTRY_URL}/finetuning-service:buildcache,registry.insecure=true"
            - "--opt=cache-to=type=registry,ref=${REGISTRY_URL}/finetuning-service:buildcache,mode=max,registry.insecure=true"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            readOnlyRootFilesystem: false
            privileged: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: build-context
              mountPath: /workspace
              readOnly: true
            - name: buildkit-tmp
              mountPath: /tmp
      volumes:
        - name: build-context
          hostPath:
            path: ${BUILD_CONTEXT}
            type: Directory
        - name: buildkit-tmp
          emptyDir: {}
