apiVersion: batch/v1
kind: Job
metadata:
  name: kaniko-celery-worker
  namespace: dataprep
spec:
  template:
    spec:
      restartPolicy: Never
      # Kaniko requires root to manipulate container filesystem layers during image builds
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      containers:
        - name: kaniko
          image: gcr.io/kaniko-project/executor:latest
          args:
            - "--dockerfile=kaniko/celery/Dockerfile"
            - "--context=dir:///workspace"
            - "--destination=${REGISTRY_URL}/celery-worker:latest"
          env:
            - name: REGISTRY_URL
              value: "$REGISTRY_URL"
            - name: MINIO_ENDPOINT
              value: "$MINIO_ENDPOINT"
            - name: MINIO_ACCESS_KEY
              value: "$MINIO_ACCESS_KEY"
            - name: MINIO_SECRET_KEY
              value: "$MINIO_SECRET_KEY"
            - name: MINIO_BUCKET_NAME
              value: "$MINIO_BUCKET_NAME"
            - name: MINIO_SECURE
              value: "$MINIO_SECURE"
            - name: MINIO_REGION
              value: "$MINIO_REGION"
            - name: MINIO_CERT_VERIFY
              value: "$MINIO_CERT_VERIFY"
            - name: DB_HOST
              value: "$DB_HOST"
            - name: DB_PORT
              value: "$DB_PORT"
            - name: DB_NAME
              value: "$DB_NAME"
            - name: DB_USER
              value: "$DB_USER"
            - name: DB_PASSWORD
              value: "$DB_PASSWORD"
            - name: DB_POOL_SIZE
              value: "$DB_POOL_SIZE"
            - name: DB_MAX_OVERFLOW
              value: "$DB_MAX_OVERFLOW"
          # Kaniko requires root and write access to build container images
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Required: kaniko writes filesystem layers during build
            privileged: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: build-context
              mountPath: /workspace
      volumes:
        - name: build-context
          hostPath:
            path: $BUILD_CONTEXT
            type: Directory