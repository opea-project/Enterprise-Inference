# This Secret must be created out-of-band before deploying the chart.
# It is NOT managed by Helm to avoid storing sensitive values in version control.
#
# Run once per namespace:
#   kubectl create secret generic keycloak-client-secret \
#     --from-literal=client-secret=<your-actual-keycloak-client-secret> \
#     -n dataprep
#
# To update an existing secret:
#   kubectl create secret generic keycloak-client-secret \
#     --from-literal=client-secret=<new-value> \
#     -n dataprep --dry-run=client -o yaml | kubectl apply -f -
