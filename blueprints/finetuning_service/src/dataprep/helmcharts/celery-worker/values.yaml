celery:
  replicaCount: 1
  image:
    repository: localhost:5000/celery-worker
    tag: latest
    pullPolicy: Always
  command: ["celery", "-A", "core.celery.celery_config.celery_app", "worker", "--loglevel=info", "--concurrency=4", "--max-tasks-per-child=10", "--prefetch-multiplier=1", "-Q", "dataprep_queue"]
  resources:
    requests:
      cpu: "2000m"
      memory: "2Gi"
    limits:
      cpu: "3000m"
      memory: "3Gi"
  env:
    - name: HOST
      value: "0.0.0.0"
    - name: PORT
      value: "8010"
    - name: CELERY_BROKER_URL
      value: redis://redis-broker-redis.dataprep.svc.cluster.local:6379/0
    - name: MINIO_ENDPOINT
      value: minio.dataprep.svc.cluster.local:9000
    - name: MINIO_ACCESS_KEY
      value: admin
    - name: MINIO_SECRET_KEY
      value: minio123
    - name: MINIO_BUCKET_NAME
      value: dataprep
    - name: MINIO_SECURE
      value: "false"
    - name: MINIO_REGION
      value: us-west-2
    - name: MINIO_CERT_VERIFY
      value: "false"
    - name: API_ENDPOINT_KEY
      value: ""
    # PostgreSQL Configuration for Celery workers
    - name: DB_HOST
      value: postgres.dataprep.svc.cluster.local
    - name: DB_PORT
      value: "5432"
    - name: DB_NAME
      value: dataprep
    - name: DB_USER
      value: postgres
    - name: DB_PASSWORD
      value: postgres
    - name: DB_POOL_SIZE
      value: "5"
    - name: DB_MAX_OVERFLOW
      value: "10"
    - name: DB_POOL_RECYCLE
      value: "3600"
    - name: DOCLING_NUM_THREADS
      value: "24"
    - name: MODEL_CONTEXT_WINDOW
      value: "32000"
    - name: QA_PER_DATASET_CHUNKS
      value: "10"
    - name: LLM_API_BASE
      value: ""
    - name: LLM_MODEL_ID
      value: "meta-llama/Llama-3.3-70B-Instruct"
    - name: LLM_API_KEY
      value: ""
    # Keycloak Configuration
    - name: KEYCLOAK_ENABLED
      value: "false"
    - name: KEYCLOAK_URL
      value: ""
    - name: KEYCLOAK_REALM
      value: "master"
    - name: KEYCLOAK_CLIENT_ID
      value: ""
    - name: KEYCLOAK_CLIENT_SECRET
      value: ""
    - name: KEYCLOAK_VERIFY_SSL
      value: "false"
    - name: ALLOWED_ORIGINS
      value: "http://localhost:3000,http://localhost:8080"
flower:
  enabled: true
  image:
    repository: mher/flower
    tag: "latest"
    pullPolicy: IfNotPresent
  command: ["celery", "--broker=redis://redis-broker-redis.dataprep.svc.cluster.local:6379/0", "flower", "--port=5555"]
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  env:
    - name: CELERY_BROKER_URL
      value: redis://redis-broker-redis.dataprep.svc.cluster.local:6379/0
    - name: CELERY_RESULT_BACKEND
      value: redis://redis-broker-redis.dataprep.svc.cluster.local:6379/0
    - name: FLOWER_UNAUTHENTICATED_API
      value: "true"
  service:
    type: ClusterIP
    port: 5555
