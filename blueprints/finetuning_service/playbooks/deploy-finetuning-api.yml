---
###########################################################################
# Deploy Fine-Tuning API Application
###########################################################################

###########################################################################
# Validation
###########################################################################
- name: Validate Required Keycloak Variables
  fail:
    msg: |
      ERROR: {{ item.name }} is not defined!
      When running this playbook independently, you must provide Keycloak credentials.
      Either:
      1. Run via deploy-all.yml (automatically sets up Keycloak)
      2. Manually run setup-keycloak-finetuning.sh and pass variables:
         -e "finetune_keycloak_backend_client_id=finetuning-backend"
         -e "finetune_keycloak_backend_client_secret=<secret-from-keycloak>"
  when: vars[item.var] is not defined or vars[item.var] | length == 0
  loop:
    - { var: 'finetune_keycloak_backend_client_id', name: 'Keycloak Backend Client ID' }
    - { var: 'finetune_keycloak_backend_client_secret', name: 'Keycloak Backend Client Secret' }
    - { var: 'finetune_keycloak_url', name: 'Keycloak URL' }
    - { var: 'finetune_keycloak_realm', name: 'Keycloak Realm' }
    - { var: 'nvidia_finetune_backend_url', name: 'Nvidia Fine-Tuning Backend URL' }
    - { var: 'nvidia_keycloak_token_url', name: 'Nvidia Keycloak Token URL' }
    - { var: 'nvidia_keycloak_client_id', name: 'Nvidia Keycloak Client ID' }
    - { var: 'nvidia_keycloak_client_secret', name: 'Nvidia Keycloak Client Secret' }
    - { var: 'dataprep_service_url', name: 'DataPrep Service URL' }
  run_once: true

###########################################################################
# Deploy Infrastructure
###########################################################################
- name: Deploy API PostgreSQL
  shell: |
    helm upgrade --install finetuning-service-postgresql {{ finetune_api_source_path }}/helm-charts/postgresql \
      --namespace {{ finetune_api_namespace }} \
      --set auth.username={{ finetune_api_postgres_username }} \
      --set auth.password={{ finetune_api_postgres_password }} \
      --set auth.database={{ finetune_api_postgres_database }} \
      --set persistence.enabled=true \
      --set persistence.storageClass={{ finetune_persistence_storage_class }} \
      --set persistence.size={{ finetune_api_postgres_storage_size }} \

  run_once: true

###########################################################################
# Deploy API Application
###########################################################################
- name: Create APISIX OIDC Secret for Keycloak Backend Client
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: finetuning-backend-secret
        namespace: "{{ finetune_api_namespace }}"
      type: Opaque
      stringData:
        client_id: "{{ finetune_keycloak_backend_client_id }}"
        client_secret: "{{ finetune_keycloak_backend_client_secret }}"
  run_once: true

- name: Check Fine-Tuning API Helm release status
  shell: |
    helm list -n {{ finetune_api_namespace }} -a --filter '^{{ finetune_api_name }}$' -o json
  register: finetune_api_release_list
  changed_when: false
  failed_when: false
  run_once: true

- name: Parse Fine-Tuning API Helm release status
  set_fact:
    finetune_api_release_entries: "{{ finetune_api_release_list.stdout | default('[]') | from_json }}"
    finetune_api_release_status: "{{ (finetune_api_release_list.stdout | default('[]') | from_json)[0].status if ((finetune_api_release_list.stdout | default('[]') | from_json) | length > 0) else 'absent' }}"
  run_once: true

- name: Remove failed or partial Fine-Tuning API Helm release
  shell: |
    timeout 60s helm uninstall {{ finetune_api_name }} -n {{ finetune_api_namespace }} --wait || true
  when: finetune_api_release_status != 'absent' and finetune_api_release_status != 'deployed'
  changed_when: false
  failed_when: false
  run_once: true

- name: Remove stale Fine-Tuning API resources when release does not exist
  shell: |
    timeout 60s kubectl delete {{ item.kind }} {{ item.name }} -n {{ item.namespace }} --ignore-not-found=true --wait=true || true
  loop:
    - { kind: deployment, name: "{{ finetune_api_name }}", namespace: "{{ finetune_api_namespace }}" }
    - { kind: service, name: "{{ finetune_api_name }}", namespace: "{{ finetune_api_namespace }}" }
    - { kind: configmap, name: "{{ finetune_api_name }}-config", namespace: "{{ finetune_api_namespace }}" }
    - { kind: secret, name: "{{ finetune_api_name }}-secret", namespace: "{{ finetune_api_namespace }}" }
    - { kind: networkpolicy, name: "{{ finetune_api_name }}", namespace: "{{ finetune_api_namespace }}" }
    - { kind: poddisruptionbudget, name: "{{ finetune_api_name }}", namespace: "{{ finetune_api_namespace }}" }
    - { kind: horizontalpodautoscaler, name: "{{ finetune_api_name }}", namespace: "{{ finetune_api_namespace }}" }
    - { kind: apisixroute, name: "{{ finetune_api_name }}-apisixroute", namespace: "{{ finetune_api_namespace }}" }
    - { kind: ingress, name: "{{ finetune_api_name }}-apisix-ingress", namespace: auth-apisix }
  when: finetune_api_release_status != 'deployed'
  changed_when: false
  failed_when: false
  run_once: true

- name: Deploy Fine-Tuning API Helm Chart (includes Service, APISIXRoute, APISIX Ingress)
  shell: |
    helm upgrade --install {{ finetune_api_name }} {{ finetune_api_source_path }}/helm-charts/finetuning-api \
      --namespace {{ finetune_api_namespace }} \
      --set app.replicaCount={{ finetune_api_replica_count | int }} \
      --set autoscaling.enabled={{ finetune_autoscaling_enabled | default(false) | bool | lower }} \
      --set app.image.repository={{ finetune_api_image_repository }} \
      --set app.image.tag={{ finetune_api_image_tag }} \
      --set app.image.pullPolicy={{ finetune_api_image_pull_policy }} \
      --set app.service.port={{ finetune_api_service_port | int }} \
      --set app.resources.requests.cpu={{ finetune_api_cpu_request }} \
      --set app.resources.requests.memory={{ finetune_api_memory_request }} \
      --set app.resources.limits.cpu={{ finetune_api_cpu_limit }} \
      --set app.resources.limits.memory={{ finetune_api_memory_limit }} \
      --set-string ingress.baseDomain={{ cluster_url | quote }} \
      --set-string app.config.keycloakIssuer={{ (finetune_keycloak_url + '/realms/' + finetune_keycloak_realm) | quote }} \
      --set-string app.config.nvidiaApiUrl={{ nvidia_finetune_backend_url | quote }} \
      --set-string app.config.nvidiaKeycloakVerifySsl={{ nvidia_keycloak_verify_ssl | default('true') | string }} \
      --set-string secrets.databaseUrl={{ ('postgresql://' + finetune_api_postgres_username + ':' + finetune_api_postgres_password + '@finetuning-service-postgresql.' + finetune_api_namespace + '.svc.cluster.local:' + finetune_api_postgres_port + '/' + finetune_api_postgres_database) | quote }} \
      --set-string secrets.nvidiaKeycloakTokenUrl={{ nvidia_keycloak_token_url | quote }} \
      --set-string secrets.nvidiaKeycloakClientId={{ nvidia_keycloak_client_id | quote }} \
      --set-string secrets.nvidiaKeycloakClientSecret={{ nvidia_keycloak_client_secret | quote }} \
      --set-string apisix.oidc.realm={{ finetune_keycloak_realm | quote }} \
      --set-string apisix.oidc.client_id={{ finetune_keycloak_backend_client_id | quote }} \
      --set-string apisix.oidc.client_secret={{ finetune_keycloak_backend_client_secret | quote }} \
      --set apisix.oidc.secret_ref=finetuning-backend-secret \
      --wait --timeout 5m
  run_once: true

- name: Initialize Fine-Tuning API Database Schema
  shell: |
    POD_NAME=$(kubectl get pods -n {{ finetune_api_namespace }} -l app=postgres \
      -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
    if [ -z "$POD_NAME" ]; then
      echo "ERROR: PostgreSQL pod not found!"
      exit 1
    fi
    TABLE_COUNT=$(kubectl exec -n {{ finetune_api_namespace }} "$POD_NAME" -- \
      psql -U {{ finetune_api_postgres_username }} -d {{ finetune_api_postgres_database }} \
      -tAc "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='public';" 2>/dev/null || echo "0")
    if [ "$TABLE_COUNT" = "0" ]; then
      echo "Initializing database schema from init-db.sql..."
      kubectl exec -n {{ finetune_api_namespace }} -i "$POD_NAME" -- \
        psql -U {{ finetune_api_postgres_username }} -d {{ finetune_api_postgres_database }} \
        < {{ finetune_api_source_path }}/app/sql/init-db.sql
      echo "Database schema initialized successfully"
    else
      echo "Database already initialized ($TABLE_COUNT tables found), skipping"
    fi
  run_once: true

- name: Wait for Fine-Tuning API to be Ready
  shell: |
    kubectl rollout status deployment/{{ finetune_api_name }} \
      --namespace={{ finetune_api_namespace }} \
      --timeout=300s
  run_once: true
